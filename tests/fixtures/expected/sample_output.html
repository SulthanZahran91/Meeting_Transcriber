<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meeting Transcript</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 24px;
      color: #1f2937;
      background: #f8fafc;
    }
    h1 { margin: 0 0 8px; }
    .meta {
      margin-bottom: 16px;
      color: #334155;
      line-height: 1.6;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: #ffffff;
      border: 1px solid #cbd5e1;
    }
    td {
      border-bottom: 1px solid #e2e8f0;
      vertical-align: top;
      padding: 10px 12px;
      width: 50%;
    }
    tr:nth-child(even) { background: #f8fafc; }
    .ts {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9rem;
      color: #475569;
      display: inline-block;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <h1>Meeting Transcript</h1>
  <div class="meta">
    <div><strong>Source:</strong> korean_sample.ogg</div>
    <div><strong>Date:</strong> 2026-03-07T00:00:00+00:00</div>
    <div><strong>Model:</strong> tiny (cpu/int8)</div>
    <div><strong>Processing Time:</strong> 0.1s</div>
  </div>
  <table>
    <tbody>
      <tr><td><span class='ts'>00:00:00.000</span><div>대한민국</div></td><td>South Korea</td></tr>
<tr><td><span class='ts'>00:00:01.200</span><div>회의 시작</div></td><td>Meeting starts</td></tr>
    </tbody>
  </table>
</body>
</html>
